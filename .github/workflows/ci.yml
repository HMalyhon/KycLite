# CI: enforce both quality gates on every push/PR, then deploy main to Azure App Service.
#
# The backend build runs with TreatWarningsAsErrors + analyzers + StyleCop; the frontend gate is
# ESLint at --max-warnings 0, Prettier check, Vitest and the type-checking build — the same
# commands documented in the README's "Quality gate" section.
#
# The deploy job authenticates with OIDC (federated identity, no long-lived secret) and ships a
# single App Service package: the published API with the built Vue app in wwwroot. It carries no
# Document Intelligence credential at all — the deployed app authenticates to the OCR resource with
# its managed identity, wired up once by infra/main.bicep.
# One-time Azure setup: see infra/README.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 22
  AZURE_WEBAPP_NAME: kyclite

jobs:
  backend:
    name: Backend · build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (warnings-as-errors gate)
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

  frontend:
    name: Frontend · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (--max-warnings 0 gate)
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build (vue-tsc type-check + vite)
        run: npm run build

  deploy:
    name: Deploy · Azure App Service
    # Deploy only what passed both gates, and only from main (never from PRs).
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.webapp.outputs.webapp-url }}
    permissions:
      id-token: write # required for the OIDC federated-identity login
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Publish API
        run: dotnet publish backend/KycLite.Api --configuration Release --output publish

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      # Single-app hosting: the API serves the SPA from wwwroot (see Program.cs).
      - name: Bundle frontend into the API package
        run: |
          mkdir -p publish/wwwroot
          cp -r frontend/dist/. publish/wwwroot/

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        id: webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: publish

      - name: Smoke test
        env:
          # Read through the environment rather than interpolating the expression into the script,
          # so its value is always data and never shell syntax.
          EXPECTED_EXTRACTOR_MODE: ${{ vars.EXPECTED_EXTRACTOR_MODE }}
        run: |
          # GitHub runs this with `bash -e` but not pipefail, so without this a failing curl in a
          # pipeline is masked by the exit status of the command it feeds — a dead app would pass.
          set -o pipefail
          base="${{ steps.webapp.outputs.webapp-url }}"
          # F1 cold starts can be slow; retry before declaring the deploy broken.
          for i in $(seq 1 10); do
            if curl -sSf --max-time 30 "$base/health" >/dev/null; then break; fi
            [ "$i" = 10 ] && { echo "health check failed" >&2; exit 1; }
            sleep 15
          done
          curl -sSf --max-time 30 "$base/api/fields" | head -c 400

          # Which engine the deployed app came up on. Set the repository variable
          # EXPECTED_EXTRACTOR_MODE (azure or mock) to make this an assertion, so an infra change
          # that drops the Document Intelligence app setting fails the deploy.
          actual=$(curl -sSf --max-time 30 "$base/api/status" | sed -n 's/.*"extractorMode":"\([^"]*\)".*/\1/p')
          [ -n "$actual" ] || { echo "could not read extractorMode from /api/status" >&2; exit 1; }
          echo "extractor mode: $actual${EXPECTED_EXTRACTOR_MODE:+ (expected $EXPECTED_EXTRACTOR_MODE)}"
          if [ -n "$EXPECTED_EXTRACTOR_MODE" ] && [ "$actual" != "$EXPECTED_EXTRACTOR_MODE" ]; then
            echo "unexpected extractor mode" >&2
            exit 1
          fi

          # `azure` only means an endpoint is configured — it does not prove the app's managed
          # identity can actually get a token. So run one real verification: a missing or
          # still-propagating role assignment fails the deploy here instead of reaching the first
          # visitor as an opaque error. Costs one page of the free F0 quota per deploy.
          code=$(curl -s -o probe.json -w '%{http_code}' --max-time 60 -X POST "$base/api/verify" \
            -F 'file=@docs/screenshot.png' -F 'fields=*' -F 'fieldChecks=[]')
          echo "verify probe: HTTP $code"
          if [ "$code" != "200" ]; then
            head -c 400 probe.json >&2
            echo >&2
            echo "the verification pipeline is not working end to end" >&2
            exit 1
          fi
